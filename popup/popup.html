<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Hydrus Importer</h1>

    <div class="section">
      <label for="apiUrl">Hydrus API URL</label>
      <input type="text" id="apiUrl" placeholder="http://127.0.0.1:45869">
    </div>

    <div class="section">
      <label for="accessKey">Access Key</label>
      <div class="input-row">
        <input type="password" id="accessKey" placeholder="Hydrus API Access Key">
        <button id="toggleKey" class="btn-small" title="表示/非表示">👁</button>
      </div>
    </div>

    <div class="section">
      <h2>Tag Services</h2>
      <div class="field-row">
        <label for="serviceTwitter">Twitter</label>
        <input type="text" id="serviceTwitter" placeholder="twitter tags">
      </div>
      <div class="field-row">
        <label for="servicePixiv">Pixiv</label>
        <input type="text" id="servicePixiv" placeholder="pixiv tags">
      </div>
    </div>

    <div class="section">
      <label for="customTags">Custom Tags (comma-separated)</label>
      <textarea id="customTags" rows="2" placeholder="tag1, tag2, tag3"></textarea>
    </div>

    <div class="actions">
      <button id="testConnection" class="btn">Test Connection</button>
      <button id="save" class="btn btn-primary">Save</button>
    </div>

    <div id="status" class="status hidden"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
